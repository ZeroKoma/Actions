<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Contador de Acciones</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <!-- <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"> -->
    <meta name="theme-color" content="#4f46e5">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
  </head>
  <body>
    <div id="app">
      <!-- Passcode Screen -->
      <div id="passcode-screen" class="passcode-overlay hidden">
        <div class="passcode-container">
          <div class="passcode-header">
            <h2 id="passcode-msg">PIN</h2>
          </div>
          <div class="passcode-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <div class="passcode-keypad">
            <button class="key">1</button><button class="key">2</button><button class="key">3</button>
            <button class="key">4</button><button class="key">5</button><button class="key">6</button>
            <button class="key">7</button><button class="key">8</button><button class="key">9</button>
            <div class="key-empty"></div>
            <button class="key">0</button>
            <button class="key-backspace">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <header class="app-header">
        <h1 id="app-title">Principal</h1>
        <button id="btn-manual-entry" class="btn-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </header>
      <main id="content">
        <!-- Main View -->
        <section id="view-main" class="view active">
          <div id="actions-container"></div>
        </section>

        <!-- Data Views (Weekly/Monthly) -->
        <section id="view-weekly" class="view hidden">
          <div class="nav-controls">
            <button id="weekly-today-btn" class="btn-today-link" style="display: none;"></button>
            <button id="prev-week">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>
            <h3 id="week-label">Semana</h3>
            <button id="next-week">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>
          <div id="weekly-action-selector" class="action-selector"></div>
          <div id="weekly-grid" class="calendar-grid"></div>
          <div id="weekly-chart" class="weekly-chart-container"></div>
          <div id="weekly-total" class="weekly-total-container"></div>
        </section>

        <section id="view-monthly" class="view hidden">
          <div class="nav-controls">
            <button id="monthly-today-btn" class="btn-today-link" style="display: none;"></button>
            <button id="prev-month">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>
            <h3 id="month-label">Mes</h3>
            <button id="next-month">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>
          <div id="monthly-action-selector" class="action-selector"></div>
          <div id="monthly-grid" class="calendar-grid monthly"></div>
          <div id="monthly-total" class="weekly-total-container"></div>
        </section>

        <!-- History -->
        <section id="view-history" class="view hidden">
          <div class="nav-controls">
            <button id="history-today-btn" class="btn-today-link" style="display: none;"></button>
            <button id="prev-history">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>
            <div class="history-nav-center">
              <h3 id="history-date-label">Día</h3>
            </div>
            <button id="next-history">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </button>
          </div>
          <div id="history-list" class="history-day-container"></div>
        </section>

        <!-- Settings -->
        <section id="view-settings" class="view hidden">
          <h3 id="settings-title">Configuración</h3>
          
          <div class="settings-group" style="margin-top: 1.5rem; background: white; padding: 1rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;">
            <label id="label-lang" style="font-weight: 600; font-size: 0.9rem;">Idioma</label>
            <div class="switch-container">
              <span style="font-size: 0.75rem; font-weight: 700; color: #94a3b8;">ES</span>
              <label class="switch">
                <input type="checkbox" id="lang-switch">
                <span class="slider"></span>
              </label>
              <span style="font-size: 0.75rem; font-weight: 700; color: #94a3b8;">EN</span>
            </div>
          </div>

          <div class="settings-group" style="margin-top: 1rem; background: white; padding: 1rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;">
            <label id="label-dark" style="font-weight: 600; font-size: 0.9rem;">Modo Oscuro</label>
            <div class="switch-container">
              <label class="switch">
                <input type="checkbox" id="dark-switch">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="settings-group" style="margin-top: 1rem; background: white; padding: 1rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <label id="label-data" style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 1rem;">Datos (JSON)</label>
            <div style="display: flex; gap: 10px;">
              <button id="btn-export" class="btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span id="text-export">Exportar</span>
              </button>
              <button id="btn-import" class="btn-secondary" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span id="text-import">Importar</span>
              </button>
            </div>
            <!-- Input oculto para cargar archivos -->
            <input type="file" id="import-file-input" accept=".json" style="display: none;">
          </div>

          <button id="reset-app" class="btn-danger">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
              <line x1="10" x2="10" y1="11" y2="17" />
              <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
            <span id="reset-text">Eliminar todo y empezar de nuevo</span>
          </button>

          <div class="settings-footer">
            <p><span id="label-version">Versión</span> <span id="app-version"></span></p>
            <p>By ZeroKoma</p>
          </div>
        </section>
      </main>

      <button id="add-action-btn" class="fab-btn" aria-label="Añadir">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>

      <!-- Edit Action Dialog -->
      <dialog id="edit-action-dialog" class="modal-dialog">
        <div class="dialog-content">
          <h3 id="edit-dialog-title">Editar nombre</h3>
          <div style="margin: 1.5rem 0;">
            <input type="text" id="edit-action-input" maxlength="20" class="edit-input" />
            <div style="margin-top: 1rem; text-align: left;">
              <label id="label-edit-goal" style="font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 0.4rem; display: block;">Meta diaria (0 = libre)</label>
              <div class="goal-input-container">
                <button type="button" id="goal-minus" class="btn-goal-adjust" aria-label="Disminuir">−</button>
                <input type="number" id="edit-action-goal" min="0" max="99" inputmode="numeric" class="edit-input" style="width: 70px; margin: 0;"/>
                <button type="button" id="goal-plus" class="btn-goal-adjust" aria-label="Aumentar">+</button>
              </div>
            </div>
          </div>
          <div class="dialog-buttons">
            <button id="edit-action-delete" class="btn-icon-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            </button>
            <div style="flex: 1; display: flex; gap: 0.75rem;">
              <button id="edit-action-cancel" class="btn-secondary">Cancelar</button>
              <button id="edit-action-save" class="btn-primary-action">Aceptar</button>
            </div>
          </div>
        </div>
      </dialog>

      <!-- Manual Entry Dialog -->
      <dialog id="manual-entry-dialog" class="modal-dialog">
        <div class="dialog-content">
          <h3 id="manual-dialog-title">Registro Manual</h3>
          <div class="manual-form-fields">
            <div>
              <label id="label-manual-action" class="field-label">Acción</label>
              <select id="manual-action-select" class="edit-input"></select>
            </div>
            <div>
              <label id="label-manual-date" class="field-label">Fecha</label>
              <input type="date" id="manual-date-input" class="edit-input" />
            </div>
            <div>
              <label id="label-manual-time" class="field-label">Hora</label>
              <input type="time" id="manual-time-input" class="edit-input" />
            </div>
          </div>
          <div class="dialog-buttons">
            <button id="manual-cancel" class="btn-secondary">Cancelar</button>
            <button id="manual-save" class="btn-primary-action">Guardar</button>
          </div>
        </div>
      </dialog>

      <!-- Import Options Dialog -->
      <dialog id="import-options-dialog" class="modal-dialog">
        <div class="dialog-content">
          <h3 id="import-title">Importar datos</h3>
          <p id="import-body">¿Cómo quieres importar los datos?</p>
          <div class="dialog-buttons" style="flex-direction: column; gap: 0.5rem;">
            <button id="import-merge-btn" class="btn-primary-action">Mezclar con datos actuales</button>
            <button id="import-overwrite-btn" class="btn-danger-action" style="background-color: var(--danger);">Borrar y sobrescribir todo</button>
            <button id="import-cancel-btn" class="btn-secondary">Cancelar</button>
          </div>
        </div>
      </dialog>

      <!-- Confirmation dialog -->
      <dialog id="confirm-dialog" class="modal-dialog">
        <div class="dialog-content">
          <h3>Confirmar acción</h3>
          <p>¿Seguro? Se borrarán todos los datos.</p>
          <div class="dialog-buttons">
            <button id="confirm-cancel" class="btn-secondary">Cancelar</button>
            <button id="confirm-accept" class="btn-danger-action">
              Aceptar
            </button>
          </div>
        </div>
      </dialog>

      <!-- Bottom navigation for mobile -->
      <nav class="mobile-nav">
        <button data-view="main">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          <span>Principal</span>
        </button>
        <button data-view="history">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 6h4" />
            <path d="M2 10h4" />
            <path d="M2 14h4" />
            <path d="M2 18h4" />
            <rect width="16" height="20" x="4" y="2" rx="2" />
            <path d="M16 2v20" />
          </svg>
          <span>Diario</span>
        </button>
        <button data-view="weekly">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="4" rx="2" ry="2" />
            <line x1="16" x2="16" y1="2" y2="6" />
            <line x1="8" x2="8" y1="2" y2="6" />
            <line x1="3" x2="21" y1="10" y2="10" />
          </svg>
          <span>Semanal</span>
        </button>
        <button data-view="monthly">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" x2="18" y1="20" y2="10" />
            <line x1="12" x2="12" y1="20" y2="4" />
            <line x1="6" x2="6" y1="20" y2="14" />
          </svg>
          <span>Mensual</span>
        </button>
        <button data-view="settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <span>Ajustes</span>
        </button>
      </nav>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
